#### Hyprland Config ####

# Default Monitor (Fallback)
monitor =,preferred,auto,1

# Main Setup
monitor=desc:LG Electronics LG ULTRAGEAR 204NTGY8J231,3440x1440@144,0x0,1
monitor=desc:Acer Technologies Acer V277U 0x10322DB7,2560x1440@74.89,3440x-650,1,transform,3

workspace = 4,monitor:desc:Acer Technologies Acer V277U 0x10322DB7,default:true,persistent:true
workspace=4,static

# Init
exec-once = udiskie &
exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = awww-daemon

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# https://wiki.hypr.land/Configuring/XWayland/
env = XCURSOR_SIZE, 24
env = GDK_SCALE,1

input {
    kb_layout = us
    kb_options = ctrl:nocaps
    follow_mouse = 1
    mouse_refocus = false
    touchpad {
        natural_scroll = yes
    }
    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(ffffffee)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 3, myBezier, slide
    animation = windowsOut, 1, 3, default, slide
    animation = workspaces, 1, 3, default
    animation = layers, 1, 1, default, slide
}

dwindle {
    pseudotile = yes
    preserve_split = no
    smart_split = no
}

gesture = 3, horizontal, workspace
layerrule {
    name = disable-slurp-anim
    match:namespace = ^(selection)$
    no_anim = on
}

# https://wiki.hyprland.org/Configuring/Window-Rules/

# System Level Apps should float by default
windowrule {
    name = system-floats
    match:class = ^(blueman-manager|org.pulseaudio.pavucontrol|imv)$
    size = 1000 600
    float = on
    center = on
}

windowrule {
    name = ghostty-floating
    match:initial_class = ^(com.ghostty.floating)$
    float = on
    size = 1000 600
    center = on
}

windowrule {
    name = thunar-float
    match:initial_class = ^(thunar)$
    float = on
    size = 1100 700
    center = on
}

windowrule {
    name = thunar-utilities
    match:class = ^(thunar)$
    # Match specific dialog titles like "File Operation Progress" or "Confirm"
    match:title = ^(File Operation Progress|Confirm to replace files|Attention)$
    float = on
    center = on
}

# Firefox Picture in Picture
windowrule {
    name = firefox-pip
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    keep_aspect_ratio = on
}

## Godot
# Main Editor: Tiles when the title starts with "Godot"
windowrule {
    name = godot-main
    match:class = ^(Godot)$
    match:title = ^(Godot).*$
    tile = on
}

# Tools/Popups: Floats when the title DOES NOT start with "Godot"
windowrule {
    name = godot-tools
    match:class = ^(Godot)$
    match:title = negative:^(Godot).*$
    float = on
}

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT

# https://wiki.hyprland.org/Configuring/Binds/
bind = $mainMod, Return, exec, ghostty
bind = $mainMod SHIFT, Return, exec, ghostty --class=com.ghostty.floating
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, thunar
# Window
bind = $mainMod, V, togglefloating,
bind=  $mainMod, F, fullscreen
# Utilies
bind = $mainMod, R, exec, $HOME/.local/bin/reload-desktop
bind = $mainMod, P, exec, $HOME/.config/rofi/bin/powermenu
bind = $mainMod, Space, exec, $HOME/.config/rofi/bin/launcher
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | tee ~/Pictures/screenshots/$(date +'%Y-%m-%d-%H%M%S.png') | wl-copy
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod, TAB, exec, pkill -9 hyprsunset || hyprsunset --temperature 3000
# Volume / Brightness
binde=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPrev, exec, playerctl previous
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde=,XF86MonBrightnessDown,exec,brightnessctl set 5%- && dunstify -u low -t 3000 -r 90210 "󰛨   $(brightnessctl get | awk -v max=$(brightnessctl max) '{print int(($1 / max) * 100)}')%"
binde=,XF86MonBrightnessUp,exec,brightnessctl set +5% && dunstify -u low -t 3000 -r 90210 "󰛨   $(brightnessctl get | awk -v max=$(brightnessctl max) '{print int(($1 / max) * 100)}')%"

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
